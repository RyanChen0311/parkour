<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏃‍♂️ 跑酷幻影遊戲 | Parkour Phantom Game</title>
  <meta name="description" content="一個有趣的跑酷幻影動畫遊戲，支援多職業角色、自訂顏色和流暢的鍵盤控制">
  <meta name="keywords" content="跑酷遊戲,幻影特效,HTML5遊戲,線上遊戲">
  <meta property="og:title" content="🏃‍♂️ 跑酷幻影遊戲">
  <meta property="og:description" content="體驗炫酷的跑酷幻影特效！支援4種職業角色、自訂顏色和流暢控制">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏃‍♂️</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <h1 class="title">🏃‍♂️</h1>
  </div>

  <div class="game-container">
    <div id="character-container">
      <div id="character" class="character archer">🏹</div>
      <div class="touch-hint" id="touchHint">📱 拖曳角色移動 · 滑動背景換色</div>
    </div>
  </div>

  <div class="controls">
    <select id="classSelect">
      <option value="archer">🏹 弓箭手</option>
      <option value="mage">🔮 法師</option>
      <option value="swordsman">⚔️ 劍士</option>
      <option value="assassin">🗡️ 刺客</option>
    </select>
    <input type="range" id="speedControl" min="2" max="12" value="6">
    <button id="autoMoveBtn">🏃 開始跑酷</button>
    <button id="autoClassBtn">🎲 切換職業</button>
    <button id="resetBtn">💥 砍掉重練</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
